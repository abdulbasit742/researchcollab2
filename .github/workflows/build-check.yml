name: Build Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: "20"

jobs:
  build-check:
    name: Install, Build, and Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production build
        run: npm run build

      - name: Run lint
        run: npm run lint

      - name: Upload production build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: researchcollab-dist
          path: dist
          if-no-files-found: error
          retention-days: 7
