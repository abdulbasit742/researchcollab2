name: Support note
description: Record a ResearchCollab support note
title: "[Support note]: "
labels: ["support"]
body:
  - type: markdown
    attributes:
      value: |
        Use SUPPORT_NOTES_TEMPLATE.md before submitting this note.
  - type: input
    id: topic
    attributes:
      label: Topic
      description: Short support note title.
      placeholder: Login route note
    validations:
      required: true
  - type: input
    id: route_or_file
    attributes:
      label: Route or file
      description: Related route, component, doc, or config file.
      placeholder: /login or src/components/example.tsx
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What was tried, expected, and observed.
      placeholder: Tried / Expected / Actual
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, system, or command detail if relevant.
      placeholder: Chrome, Windows, npm run build
  - type: dropdown
    id: status
    attributes:
      label: Status
      options:
        - Open
        - Needs review
        - Resolved
    validations:
      required: true
