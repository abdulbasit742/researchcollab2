          "@type": "Question",
          "name": "How does escrow work on RCollab?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Funds are locked in escrow when a project begins. Each milestone has specific deliverables. When a milestone is verified as complete, funds are atomically released to the executor. This ensures zero payment anxiety."

        },

          "@type": "Question",
          "name": "How are trust scores calculated?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Trust scores are non-gameable, velocity-capped, and entropy-weighted. They are computed from real execution outcomes including milestone completion, peer reviews, and collaboration history. Reciprocal dampening blocks collusion."
          }
        },

          "@type": "Question",
